endpoints:
  legacy:
    base_url: "http://localhost:8000"
    headers:
      Host: "recheck10.12go.asia"
    params:
      ref: "https://recheck10.12go.com"
      a: "1"
  new:
    base_url: "http://localhost:8080"
    headers: {}
    params: {}

# Dates to test — each scenario runs once per date
dates:
  - "2026-03-23"
  # - "2026-04-15"
  # - "2026-05-20"

# Float comparison tolerance (absolute)
float_tolerance: 0.01

scenarios:
  # Place-to-place routes (uses /api/v1/search/{from}/{to}/{date})
  - name: "Bangkok to Chiang Mai"
    type: "place"
    from: "1p"
    to: "44p"
    params:
      seats: "1"

